name: Tailscale - Docker - Windows Server 2022 Auto

on:
  workflow_dispatch:
    inputs:
      link_iso:
        description: 'Dán link iso Windows Server 2022'
        required: true
  repository_dispatch:
    types: [rerun_event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: chuẩn bị phần mềm
        run: |
          sudo apt update -y
          sudo apt install wget curl -y
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }}

      - name: cài win và khởi chạy Docker
        run: |
          sudo chmod 666 /dev/kvm
          sudo mkdir -p /isos/
          
          # Lấy link ISO từ input hoặc từ lần chạy trước truyền sang
          LINK_ISO="${{ github.event.inputs.link_iso || github.event.client_payload.link_iso }}"
          
          # Tải ISO và Driver (Chạy ngầm để tối ưu thời gian)
          sudo wget -O /isos/a.iso "$LINK_ISO" &>/dev/null &
          while ps axg | grep -vw grep | grep -w wget > /dev/null; do sleep 1; done
          
          sudo wget -O /isos/driver.iso https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/archive-virtio/virtio-win-0.1.240-1/virtio-win-0.1.240.iso &>/dev/null &
          while ps axg | grep -vw grep | grep -w wget > /dev/null; do sleep 1; done
          
          # Tải file cấu hình Docker từ Repo của bạn
          wget https://raw.githubusercontent.com/socaca/buluxury/refs/heads/main/compose.yaml
          
          tailscale ip -4
          sudo docker compose up -d

      - name: Cấu hình EarnApp - Proxifier - Sandboxie
        run: |
          echo "Đang chờ Windows Server cài đặt (10 phút)..."
          sleep 600
          
          # 1. Tải file ID earnapp.settings từ link của bạn
          curl -L -o earnapp.settings https://github.com/luseoziju/android-tailscale/raw/refs/heads/main/earnapp.settings
          
          # 2. Tạo cấu trúc thư mục Sandbox bên trong Container
          $sbPath = "C:\Sandbox\Administrator\DefaultBox\user\current\AppData\Roaming\EarnApp"
          sudo docker exec windows powershell -Command "New-Item -ItemType Directory -Force -Path '$sbPath'"
          
          # 3. Đẩy file ID vào đúng vị trí để không bị mất node_id
          sudo docker cp earnapp.settings windows:"C:/Sandbox/Administrator/DefaultBox/user/current/AppData/Roaming/EarnApp/earnapp.settings"
          
          # 4. Khởi chạy các phần mềm hệ thống
          echo "Đang kích hoạt phần mềm..."
          # Chạy Proxifier chế độ ẩn
          sudo docker exec windows powershell -Command "Start-Process 'C:\Program Files\Proxifier\Proxifier.exe' -ArgumentList '/silent'"
          # Chạy Sandboxie Manager
          sudo docker exec windows powershell -Command "Start-Process 'C:\Program Files\Sandboxie-Plus\SandMan.exe'"
          
          sleep 15
          # Chạy EarnApp Portable bên trong Sandbox
          sudo docker exec windows powershell -Command "& 'C:\Program Files\Sandboxie-Plus\Start.exe' /box:DefaultBox 'C:\Users\Administrator\Downloads\EarnApp\EarnApp\earnapp.exe'"
          
          echo "Hệ thống đã sẵn sàng và Online!"

      - name: Duy trì và Tự động kích hoạt lượt sau (Vòng lặp 6h)
        if: always()
        run: |
          # Treo máy trong thời gian còn lại (khoảng 5h45m)
          echo "Máy sẽ tự động khởi tạo lại sau khi hết thời gian chạy an toàn."
          sleep 345m
          
          LINK_ISO="${{ github.event.inputs.link_iso || github.event.client_payload.link_iso }}"
          
          # Gửi lệnh chạy lại (Yêu cầu có MY_TOKEN trong Secrets)
          curl -X POST \
          -H "Authorization: token ${{ secrets.MY_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d "{\"event_type\": \"rerun_event\", \"client_payload\": {\"link_iso\": \"$LINK_ISO\"}}"
