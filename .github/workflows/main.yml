name: Tailscale - Docker - Windows Server 2022 Auto

on:
  workflow_dispatch:
    inputs:
      link_iso:
        description: 'Dán link iso Windows Server 2022'
        required: true
  repository_dispatch:
    types: [rerun_event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: chuẩn bị phần mềm
        run: |
          sudo apt update -y
          sudo apt install wget curl unzip -y
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }}

      - name: cài win và khởi chạy Docker
        run: |
          sudo chmod 666 /dev/kvm
          sudo mkdir -p /isos/
          LINK_ISO="${{ github.event.inputs.link_iso || github.event.client_payload.link_iso }}"
          sudo wget -O /isos/a.iso "$LINK_ISO" &>/dev/null &
          sudo wget -O /isos/driver.iso https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/archive-virtio/virtio-win-0.1.240-1/virtio-win-0.1.240.iso &>/dev/null &
          wait
          wget https://raw.githubusercontent.com/socaca/buluxury/refs/heads/main/compose.yaml
          sudo docker compose up -d

      - name: Chuẩn bị file nạp vào máy ảo
        run: |
          # Tải các file cần thiết về máy chủ Linux trước
          wget -O ProxifierSetup.exe https://github.com/thainguyen3979/Hyper_EarnApp/raw/refs/heads/main/ProxifierSetup.exe
          wget -O SandboxieSetup.exe https://github.com/thainguyen3979/Hyper_EarnApp/raw/refs/heads/main/Sandboxie-Plus-x64-v1.17.2.exe
          wget -O proxysave.ppx https://github.com/zulajizie/Docker-VNC/raw/refs/heads/main/proxysave.ppx
          curl -L -o earnapp.settings https://github.com/luseoziju/android-tailscale/raw/refs/heads/main/earnapp.settings
          
          # Đợi 7 phút cho Windows tạo cấu hình thư mục xong
          echo "Đang chờ máy ảo sẵn sàng (7 phút)..."
          sleep 420
          
          CONTAINER_ID=$(sudo docker ps -qf "ancestor=dockurr/windows")
          
          # Đẩy file trực tiếp vào ổ C: của Windows qua lệnh docker cp (Không cần shell Windows)
          sudo docker cp ProxifierSetup.exe $CONTAINER_ID:/main/C/ProxifierSetup.exe
          sudo docker cp SandboxieSetup.exe $CONTAINER_ID:/main/C/SandboxieSetup.exe
          sudo docker cp proxysave.ppx $CONTAINER_ID:/main/C/proxysave.ppx
          
          # Tạo script tự động cài đặt bằng file .bat (Lệnh CMD cơ bản nhất)
          echo "C:\ProxifierSetup.exe /silent" > install.bat
          echo "C:\SandboxieSetup.exe /allusers /elevate /silent" >> install.bat
          echo "start /b \"\" \"C:\Program Files\Proxifier\Proxifier.exe\" C:\proxysave.ppx /silent" >> install.bat
          
          # Đẩy file install.bat vào thư mục Startup để Windows tự chạy khi vừa login
          sudo docker cp install.bat $CONTAINER_ID:/main/C/Users/Administrator/AppData/Roaming/Microsoft/Windows/Start Menu/Programs/Startup/install.bat

      - name: Duy trì và Rerun (Vòng lặp 6h)
        if: always()
        run: |
          sleep 352m
          LINK_ISO="${{ github.event.inputs.link_iso || github.event.client_payload.link_iso }}"
          # Sử dụng MY_TOKEN đã có sẵn trong Secrets
          curl -X POST \
          -H "Authorization: token ${{ secrets.MY_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d "{\"event_type\": \"rerun_event\", \"client_payload\": {\"link_iso\": \"$LINK_ISO\"}}"
